name: Oura Sync
on:
  schedule:
    - cron: "15 */2 * * *"  # 2時間おきに同期
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Oura data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: |
          END=$(date -u +%F)
          START=$(date -u -d "20 days ago" +%F)
          curl -sf -H "Authorization: Bearer $OURA_TOKEN" \
            "https://api.ouraring.com/v2/usercollection/daily_readiness?start_date=$START&end_date=$END" > r.json
          curl -sf -H "Authorization: Bearer $OURA_TOKEN" \
            "https://api.ouraring.com/v2/usercollection/daily_sleep?start_date=$START&end_date=$END" > s.json
          python3 - <<'EOF'
          import json, datetime
          days = {}
          for rec in json.load(open('r.json')).get('data', []):
              days.setdefault(rec['day'], {})['readiness'] = rec.get('score')
          for rec in json.load(open('s.json')).get('data', []):
              days.setdefault(rec['day'], {})['sleepScore'] = rec.get('score')
          json.dump({'updated': datetime.datetime.utcnow().isoformat() + 'Z', 'days': days}, open('oura.json', 'w'))
          EOF
          rm r.json s.json
      - name: Commit
        run: |
          git config user.name "oura-sync"
          git config user.email "actions@users.noreply.github.com"
          git add oura.json
          git diff --cached --quiet || git commit -m "Oura sync"
          git push
